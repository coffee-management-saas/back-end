services:
  pgvector-db:
    image: pgvector/pgvector:pg16
    container_name: pgvector-db
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-future_saas}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123456}
    volumes:
      - pgvector-data:/var/lib/postgresql/data
    restart: unless-stopped
    mem_limit: 384m
    cpus: 0.50
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-future_saas}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    image: hungtruong01/back-end:latest
    container_name: saas-backend
    ports:
      - "8081:8080"
    env_file:
      - .env
    environment:
      PORT: ${PORT:-8080}
      APPLICATION_NAME: ${APPLICATION_NAME:-future_saas}
      SPRING_PROFILES_ACTIVE: prod

      DB_HOST: pgvector-db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-future_saas}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-123456}

      SPRING_DATASOURCE_URL: jdbc:postgresql://pgvector-db:5432/${DB_NAME:-future_saas}?options=-c%20TimeZone=Asia/Ho_Chi_Minh
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-123456}

      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:-3600000}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800000}

      MOMO_PARTNER_CODE: ${MOMO_PARTNER_CODE}
      MOMO_ACCESS_KEY: ${MOMO_ACCESS_KEY}
      MOMO_SECRET_KEY: ${MOMO_SECRET_KEY}
      MOMO_API_URL: ${MOMO_API_URL}
      MOMO_REDIRECT_URL: ${MOMO_REDIRECT_URL}
      MOMO_IPN_URL: ${MOMO_IPN_URL}
      FRONTEND_URL: ${FRONTEND_URL}

      CLOUD_NAME: ${CLOUD_NAME}
      CLOUD_API_KEY: ${CLOUD_API_KEY}
      CLOUD_API_SECRET: ${CLOUD_API_SECRET}

      VNPAY_API_URL: ${VNPAY_API_URL}
      VNPAY_TMN_CODE: ${VNPAY_TMN_CODE}
      VNPAY_HASH_SECRET: ${VNPAY_HASH_SECRET}
      VNPAY_RETURN_URL: ${VNPAY_RETURN_URL}

      GROQ_API_KEY: ${GROQ_API_KEY}

      JAVA_OPTS: -Xms128m -Xmx384m

    depends_on:
      pgvector-db:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.75
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgvector-data: