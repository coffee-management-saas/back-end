services:
  backend:
    image: hungtruong01/back-end:latest
    container_name: saas-backend
    env_file:
      - .env
    environment:
      PORT: ${PORT:-8080}
      APPLICATION_NAME: ${APPLICATION_NAME:-future_saas}
      SPRING_PROFILES_ACTIVE: prod

      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}

      SPRING_DATASOURCE_URL: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?options=-c%20TimeZone=Asia/Ho_Chi_Minh
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}

      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:-3600000}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800000}

      MOMO_PARTNER_CODE: ${MOMO_PARTNER_CODE}
      MOMO_ACCESS_KEY: ${MOMO_ACCESS_KEY}
      MOMO_SECRET_KEY: ${MOMO_SECRET_KEY}
      MOMO_API_URL: ${MOMO_API_URL}
      MOMO_REDIRECT_URL: ${MOMO_REDIRECT_URL}
      MOMO_IPN_URL: ${MOMO_IPN_URL}
      FRONTEND_URL: ${FRONTEND_URL}

      CLOUD_NAME: ${CLOUD_NAME}
      CLOUD_API_KEY: ${CLOUD_API_KEY}
      CLOUD_API_SECRET: ${CLOUD_API_SECRET}

      VNPAY_API_URL: ${VNPAY_API_URL}
      VNPAY_TMN_CODE: ${VNPAY_TMN_CODE}
      VNPAY_HASH_SECRET: ${VNPAY_HASH_SECRET}
      VNPAY_RETURN_URL: ${VNPAY_RETURN_URL}

      GROQ_API_KEY: ${GROQ_API_KEY}

      JAVA_OPTS: -Xms128m -Xmx384m

    # network_mode: host: backend listen trực tiếp trên port 8080 của EC2
    # Nginx cần proxy_pass về localhost:8080 (không phải 8081)
    # Với host network, không cần ports mapping
    network_mode: host
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.75
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
