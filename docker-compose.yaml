version: '3.8'

services:
  pgvector-db:
    image: pgvector/pgvector:pg16
    container_name: pgvector-db
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-future_saas}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123456}
    volumes:
      - pgvector-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: saas-backend
    ports:
      - "8081:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://pgvector-db:5432/${DB_NAME:-future_saas}?options=-c%20TimeZone=Asia/Ho_Chi_Minh
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-123456}
      - DB_HOST=pgvector-db
      - DB_PORT=5432
    env_file:
      - ./src/main/resources/.env
    depends_on:
      pgvector-db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgvector-data:
