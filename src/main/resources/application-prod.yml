services:
  pgvector-db:
    image: pgvector/pgvector:pg16
    container_name: pgvector-db
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgvector-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: saas-backend
    ports:
      - "8081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      # Đảm bảo các biến này khớp với tên trong application-prod.yml
      - SPRING_DATASOURCE_URL=jdbc:postgresql://pgvector-db:5432/${DB_NAME}?options=-c%20TimeZone=Asia/Ho_Chi_Minh
    env_file:
      - ./src/main/resources/.env
    depends_on:
      pgvector-db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgvector-data: