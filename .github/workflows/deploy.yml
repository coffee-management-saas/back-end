name: CI/CD Pipeline for Coffee SaaS

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: hawks-actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        # Sử dụng clean để xóa toàn bộ bản build cũ trước khi tạo bản mới
        run: ./mvnw clean package -DskipTests

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Gắn tag latest để server dễ pull
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/back-end:latest

      - name: Deploy to EC2 with Docker Compose
        if: github.event_name == 'push'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Di chuyển vào thư mục chứa dự án
            cd /home/${{ secrets.EC2_USER }}/back-end
            
            # Pull image mới nhất từ Docker Hub về
            sudo docker compose pull
            
            # Khởi động lại các service
            # --force-recreate: Ép Docker tạo lại container ngay cả khi cấu hình không đổi
            # --remove-orphans: Xóa các container thừa không được định nghĩa trong file yaml
            sudo docker compose up -d --force-recreate --remove-orphans
            
            # Dọn dẹp các image "rác" (dangling images) để tránh đầy ổ cứng server
            sudo docker image prune -f